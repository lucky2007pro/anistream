<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* =========================
   BODY (MOBILE FIX + FULL HEIGHT)
========================= */
html, body {
    height: 100%;
}

body {
    background: url("https://i.pinimg.com/736x/1e/13/bb/1e13bb5921f018295c582c1767923fa7.jpg")
    no-repeat center center / cover;

    min-height: 100dvh; /* 🔥 mobile fix */
    display: flex;
    flex-direction: column;

    background-color: black;
}

/* =========================
   NAVBAR
========================= */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;

    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(12px);

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 12px;
    z-index: 1000;
}

/* TITLE */
.title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-weight: bold;
    font-size: 15px;
}


/* FON RASMLAR */
.bg-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.bg-title {
    font-size: 14px;
    color: #ccc;
    margin-bottom: 5px;
}

.bg-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

/* DEFAULT */
.bg-img {
    width: 55px;
    height: 55px;

    border-radius: 50%;
    object-fit: cover;

    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer;

    transition: 0.25s ease;
    position: relative;
}

.bg-img:hover:not(.active-bg) {
    transform: scale(1.12);
}

/* SAVE BUTTON */
.bg-save {
    margin-top: 5px;
    padding: 10px;

    text-align: center;
    border-radius: 10px;

    background: rgba(0,229,255,0.15);
    color: #00e5ff;

    font-weight: bold;
    cursor: pointer;

    transition: 0.2s;
}

.bg-save:hover {
    background: rgba(0,229,255,0.25);
    box-shadow: 0 0 10px #00e5ff;
}

.bg-item {
    position: relative;
}

/* ✅ ACTIVE (SELECTED EFFECT) */
.active-bg {
    border: 3px solid #00e5ff !important;
    transform: scale(1.2);
    box-shadow:
        0 0 0 3px rgba(0,229,255,0.25),
        0 0 15px #00e5ff;
    z-index: 2;
}

/* 🔵 OUTER RING EFFECT */
.active-bg::after {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid rgba(0,229,255,0.6);
    animation: pulse 1.2s infinite;
}

@keyframes pulse {
    0% {
        transform: scale(1);
        opacity: 0.7;
    }
    50% {
        transform: scale(1.15);
        opacity: 0.2;
    }
    100% {
        transform: scale(1);
        opacity: 0.7;
    }
}




/* BACK BUTTON */
.back-btn {
    text-decoration: none;
    color: white;
    font-size: 13px;

    padding: 6px 10px;
    border-radius: 8px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    transition: 0.2s;
}

.back-btn:hover {
    background: rgba(255,255,255,0.2);
}

.toggle {
    font-size: 30px;
    cursor: pointer;
    color: #bbb;
    transition: 0.3s;
}

.toggle.active {
    color: #00e5ff;
    text-shadow: 0 0 10px #00e5ff;
    transform: rotate(180deg) scale(1.15);
}

/* =========================
   CHAT AREA (🔥 FIXED MOBILE ISSUE)
========================= */
.chat-container {
    flex: 1;
    margin-top: 50px;

    /* 🔥 CRITICAL FIX */
    height: calc(100dvh - 50px - 140px);

    overflow-y: auto;
    scroll-behavior: smooth;

    display: flex;
    flex-direction: column;

    padding: 10px;
    padding-bottom: 200px; /* 🔥 bot panel ustiga chiqmasin */
}

/* MESSAGE */
.message {
    max-width: 75%;
    padding: 10px 14px;
    margin: 5px 0;

    border-radius: 12px;
    font-size: 14px;
    line-height: 1.4;
}

.user {
    align-self: flex-end;
    background: #0088cc;
    color: white;
    border-bottom-right-radius: 0;
}

.bot {
    align-self: flex-start;
    background: rgba(0,0,0,0.6);
    color: white;
    border-bottom-left-radius: 0;
}

/* =========================
   BUTTONS (BOTTOM FIX)
========================= */
.buttons {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;

    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);

    padding: 10px;
    padding-bottom: env(safe-area-inset-bottom);

    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;

    z-index: 999;
}

/* 3 BUTTON ROW */
.buttons .row3 {
    grid-column: span 2;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

button {
    border: none;
    border-radius: 10px;

    background: rgba(0,0,0,0.7);
    color: white;

    font-size: 18px;
    padding: 22px;

    transition: 0.2s;
}

button:hover {
    background: rgba(255,255,255,0.15);
}


/* =========================
   TYPING ANIMATION (ROUND DOTS)
========================= */
.typing {
    align-self: flex-start;
    background: rgba(0,0,0,0.6);
    color: white;

    border-bottom-left-radius: 0;

    padding: 10px 14px;
    border-radius: 12px;
    margin: 5px 0;

    display: flex;
    align-items: center;
    gap: 6px;
    width: fit-content;
}

/* 🔵 REAL ROUND DOTS */
.dot {
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;

    animation: bounce 1.2s infinite;
}


.dot:nth-child(2) {
    animation-delay: 0.2s;
}

.dot:nth-child(3) {
    animation-delay: 0.4s;
}

/* ANIMATION */
@keyframes bounce {
    0%, 100% {
        transform: translateY(0);
        opacity: 0.3;
    }
    50% {
        transform: translateY(-5px);
        opacity: 1;
    }
}


/* Uchish effect */
.toast {
    position: fixed;
    top: 60px; /* 🔥 navbar (50px) + ozgina masofa */
    left: 50%;
    transform: translateX(-50%) translateY(-20px);

    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(10px);
    color: white;

    padding: 10px 18px;
    border-radius: 12px;

    font-size: 14px;
    font-weight: bold;

    opacity: 0;
    pointer-events: none;

    transition: all 0.4s ease;
    z-index: 9999;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.toast.hide {
    opacity: 0;
    transform: translateX(-50%) translateY(20px);
}
@keyframes toastIn {
    0% {
        transform: translateX(-50%) translateY(-30px);
        opacity: 0;
    }
    60% {
        transform: translateX(-50%) translateY(5px);
        opacity: 1;
    }
    100% {
        transform: translateX(-50%) translateY(0);
    }
}


/* INPUT PANEL */
/* INPUT PANEL */
.chat-input {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;

    display: flex;
    align-items: center;
    gap: 10px;

    padding: 10px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);

    z-index: 1000;
}

/* 🔥 ORQAGA BUTTON (chapda) */
.back-input-btn {
    padding: 10px 12px;
    border-radius: 10px;

    border: none;
    background: rgba(255,255,255,0.1);
    color: white;

    font-size: 18px;
    cursor: pointer;
}

/* INPUT */
.chat-input input {
    flex: 1;
    padding: 12px;

    border-radius: 10px;
    border: none;
    outline: none;

    background: rgba(255,255,255,0.1);
    color: white;
}

/* BUTTON */
.chat-input button {
    padding: 12px 18px;
    border-radius: 10px;

    border: none;
    background: #00e5ff;
    color: black;

    font-weight: bold;
    cursor: pointer;
}

/* SEND BUTTON */
.chat-input button:last-child {
    padding: 12px 18px;
    border-radius: 10px;

    border: none;
    background: #00e5ff;
    color: black;

    font-weight: bold;
    cursor: pointer;
}

/* HIDDEN CLASS */
.hidden {
    display: none;
}


/* LINK BOX */
.link-box {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* TITLE */
.link-title {
    font-size: 14px;
    color: #ccc;
}

/* COPY LINK */
.copy-link {
    padding: 8px;
    border-radius: 8px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);

    font-size: 13px;
    color: #00e5ff;
    cursor: pointer;

    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.2s;
}

.copy-link:hover {
    background: rgba(0,229,255,0.15);
}

.settings-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 5px;
}

.settings-btn {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;

    padding: 18px 10px;

    text-align: center;
    color: white;
    font-size: 13px;
    font-weight: bold;

    cursor: pointer;
    transition: 0.2s;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    gap: 6px;
}

.settings-btn:hover {
    transform: scale(1.05);
    background: rgba(0,229,255,0.15);
    border-color: #00e5ff;
    box-shadow: 0 0 10px #00e5ff;
}

/* BUTTON (BLUR) */
.link-btn {
    text-decoration: none;
    text-align: center;

    padding: 10px;
    border-radius: 10px;

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);

    color: white;
    font-weight: bold;

    border: 1px solid rgba(255,255,255,0.2);
    transition: 0.3s;
}

.link-btn:hover {
    background: rgba(0,229,255,0.2);
    border-color: #00e5ff;
    box-shadow: 0 0 10px #00e5ff;
}

@media (max-width: 600px) {

    /* =========================
       NAVBAR
    ========================= */
    .navbar {
        height: 45px;
    }

    .title {
        font-size: 13px;
    }

    .back-btn {
        padding: 10px 14px;

    }

    @keyframes msgIn {
        from {

        }

            opacity: 1;
        }
    }

    /* =========================

    .buttons {
        gap: 12px;
        padding: 12px;
        padding-bottom: calc(env(safe-area-inset-bottom) + 10px);
    }

        gap: 12px;
    }

    button {
        padding: 18px 10px;
        font-size: 15px;
        border-radius: 14px;

        transition: 0.15s;
    }

    /* tap effect */
    button:active {
        transform: scale(0.95);
        background: rgba(0,229,255,0.2);
    }

    button:focus {
        outline: none;
        box-shadow: 0 0 10px #00e5ff;
    }

    /* =========================
       TOAST
    ========================= */
    .toast {
        width: 85%;
        text-align: center;
        border-radius: 16px;
        backdrop-filter: blur(20px);
        font-size: 13px;
    }

    .toast.show {
        animation: toastIn 0.5s ease;
    }

    .chat-input button,
    .back-input-btn {
        padding: 8px 10px !important;
        font-size: 12px !important;
        min-width: 45px;
        min-height: 38px;
        border-radius: 8px;
    }

    /* ORQAGA button */
    .back-input-btn {
        font-size: 13px !important;
        padding: 8px 10px !important;
    }

    /* YUBORISH button (oxirgi button) */
    .chat-input button:last-child {
        padding: 8px 12px !important;
        font-size: 12px !important;
        min-width: 55px;
    }
}

}

/* =========================

========================= */
function copyLink(el) {
    const text = el.getAttribute("data-link");

    navigator.clipboard.writeText(text).then(() => {
        el.innerText = "✅ Nusxa olindi!";

        setTimeout(() => {
            el.innerText = text;
        }, 1500);
    });
}

function selectBg(url, el) {

    selectedBg = url;

    document.querySelectorAll(".bg-img").forEach(img => {
        img.classList.remove("active-bg");
    });

    if (el) el.classList.add("active-bg");

    document.body.style.backgroundImage = `url('${url}')`;
    localStorage.setItem("chat_bg", url);

    showToast("🖼 Fon o‘rnatildi");
}

function showToast(text) {
    const toast = document.getElementById("toast");

    toast.innerText = text;
    toast.classList.add("show");
    toast.classList.remove("hide");

    setTimeout(() => {
        toast.classList.add("hide");
        toast.classList.remove("show");
    }, 2000);
}
