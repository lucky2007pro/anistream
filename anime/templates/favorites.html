<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sevimlilar - AniStream</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f0f13;
            --bg-surface: #1a1a24;
            --accent: #ff3366;
            --accent-hover: #ff003c;
            --text-light: #ffffff;
            --text-dim: #8a8a9d;
            --glass-bg: rgba(26, 26, 36, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-light); overflow-x: hidden; padding-top: 80px; }

        .navbar { position: fixed; top: 0; left: 0; width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(15, 15, 19, 0.98); backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .nav-brand { font-size: 1.8rem; font-weight: 900; color: var(--text-light); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-brand span { color: var(--accent); }
        .nav-menu { display: flex; gap: 35px; }
        .nav-menu a { color: var(--text-light); text-decoration: none; font-weight: 600; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; position: relative; transition: color 0.3s; }
        .nav-menu a:hover { color: var(--accent); }
        .nav-actions { display: flex; gap: 15px; }
        .action-icon { background: transparent; border: none; color: var(--text-light); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: background 0.2s ease; font-size: 1.4rem; text-decoration: none; }
        .action-icon:hover { background: rgba(255, 255, 255, 0.1); }
        .profile-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); }
        .profile-btn:hover { background: var(--accent); border-color: var(--accent); transform: translateY(-2px); }

        .container { max-width: 1400px; margin: 0 auto; padding: 40px 5%; }
        .page-header { margin-bottom: 40px; }
        .page-title { font-size: 3rem; font-weight: 900; margin-bottom: 10px; }
        .page-title span { color: var(--accent); }
        .page-subtitle { color: var(--text-dim); font-size: 1.1rem; font-weight: 600; }

        .filter-tabs { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-tab { background: var(--bg-surface); border: 1px solid var(--glass-border); color: var(--text-dim); padding: 12px 25px; border-radius: 10px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: all 0.3s; }
        .filter-tab:hover, .filter-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        .favorites-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; margin-bottom: 50px; }
        .card-wrapper { text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 10px; position: relative; }
        .remove-btn { position: absolute; top: 10px; right: 10px; z-index: 20; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .remove-btn:hover { background: var(--accent); transform: scale(1.1); }
        .anime-card { width: 100%; height: 310px; border-radius: 12px; position: relative; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease; }
        .card-wrapper:hover .anime-card { transform: scale(1.05); border-color: var(--accent); box-shadow: 0 10px 20px rgba(255, 51, 102, 0.2); }
        .anime-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .card-wrapper:hover .anime-card img { transform: scale(1.1); }
        .anime-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(15,15,19,0.9) 0%, rgba(15,15,19,0.2) 50%, transparent 100%); transition: background 0.3s; }
        .card-wrapper:hover .anime-card::after { background: linear-gradient(to top, rgba(255, 51, 102, 0.6) 0%, rgba(15,15,19,0.4) 60%, transparent 100%); }
        .top-badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; color: #FFC107; z-index: 10; }
        .badge-quality { position: absolute; top: 10px; right: 50px; background: var(--accent); padding: 4px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: 900; color: white; z-index: 10; }
        .card-info-bottom { display: flex; flex-direction: column; gap: 4px; }
        .card-title { font-size: 1rem; font-weight: 800; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.3s ease; }
        .card-wrapper:hover .card-title { color: var(--accent); }
        .card-meta { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: 700; color: var(--text-dim); }
        .tag-jp { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; color: white; font-size: 0.65rem; }

        .empty-state { text-align: center; padding: 80px 20px; }
        .empty-state-icon { font-size: 5rem; margin-bottom: 20px; opacity: 0.3; }
        .empty-state-text { font-size: 1.5rem; font-weight: 800; color: var(--text-dim); margin-bottom: 10px; }
        .empty-state-subtext { color: var(--text-dim); font-size: 1rem; margin-bottom: 30px; }
        .btn-primary { background: var(--accent); color: white; border: none; border-radius: 12px; padding: 15px 35px; font-weight: 800; font-size: 1rem; cursor: pointer; text-decoration: none; display: inline-block; transition: all 0.3s; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 51, 102, 0.4); }

        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .page-title { font-size: 2rem; }
            .favorites-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .anime-card { height: 230px; }
        }

        /* ===== HAMBURGER MENU ===== */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 5px;
            z-index: 10001;
        }
        .hamburger span {
            display: block;
            width: 25px;
            height: 2px;
            background: #fff;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .mobile-nav-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,15,19,0.98);
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0;
        }
        .mobile-nav-overlay.open { display: flex; }
        .mobile-nav-overlay a {
            color: #fff;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 18px 40px;
            width: 100%;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: color 0.2s, background 0.2s;
        }
        .mobile-nav-overlay a:hover { color: #ff3366; background: rgba(255,51,102,0.05); }
        .mobile-nav-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
        }

        /* ===== RESPONSIVE: UMUMIY ===== */
        @media (max-width: 1024px) {
            .container { padding: 0 4%; }
        }
        @media (max-width: 768px) {
            .navbar, nav.navbar { padding: 12px 4%; }
            .nav-menu { display: none !important; }
            .hamburger { display: flex !important; }
            .nav-brand { font-size: 1.4rem; }
            .nav-actions .action-icon:not(.profile-btn):not([href="/search"]) { display: none; }
            .container { padding: 0 4%; }

            .page-header { padding: 80px 4% 30px; text-align: center; }
            .page-title { font-size: 2rem !important; }

            .anime-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important; gap: 12px !important; }
            .anime-card { height: 210px !important; }

            .genres-grid, .features-grid, .stats-grid {
                grid-template-columns: 1fr 1fr !important;
                gap: 15px;
            }
            .filters-grid { grid-template-columns: 1fr !important; }

            .profile-sidebar { width: 100%; right: -100%; border-left: none; }
            .profile-sidebar.active { right: 0; }

            /* Auth */
            .auth-wrapper { flex-direction: column; min-height: auto; }
            .auth-left { display: none; }
            .auth-right { width: 100%; padding: 20px; }
            .auth-card { padding: 30px 20px; max-width: 100%; }

            /* Premium */
            .pricing-grid { grid-template-columns: 1fr !important; max-width: 400px; margin: 0 auto; }

            /* Schedule */
            .schedule-grid { grid-template-columns: 1fr !important; }

            /* News */
            .news-grid { grid-template-columns: 1fr !important; }

            /* Search */
            .search-hero { padding: 80px 4% 30px; }

            /* Contact */
            .contact-grid { grid-template-columns: 1fr !important; }
            .contact-form-wrapper { padding: 25px 20px; }

            /* Settings */
            .settings-layout { flex-direction: column !important; }
            .settings-sidebar-nav { width: 100% !important; }

            /* Profile */
            .profile-header { flex-direction: column; text-align: center; gap: 20px; }
            .profile-stats { justify-content: center; }

            /* FAQ */
            .faq-grid { grid-template-columns: 1fr !important; }

            /* History */
            .history-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important; }
        }
        @media (max-width: 480px) {
            .page-title { font-size: 1.6rem !important; }
            .nav-brand { font-size: 1.2rem; }
            .anime-grid { grid-template-columns: repeat(2, 1fr) !important; }
            .genres-grid, .features-grid, .stats-grid { grid-template-columns: 1fr !important; }
            .section-title h3, .section-title { font-size: 1.3rem !important; }
        }

    </style>
</head>

<script>
    function toggleMobileNav() {
        const overlay = document.getElementById('mobileNavOverlay');
        const btn = document.getElementById('hamburgerBtn');
        if (overlay && btn) {
            overlay.classList.toggle('open');
            btn.classList.toggle('active');
            document.body.style.overflow = overlay.classList.contains('open') ? 'hidden' : '';
        }
    }
</script>
