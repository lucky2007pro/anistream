<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avtorizatsiya - AniStream</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #050505;
            --card-bg: rgba(10, 10, 12, 0.6);
            --input-bg: rgba(22, 22, 24, 0.7);
            --text-main: #ffffff;
            --text-muted: #8a8a8e;
            --accent: #ff3366;
            --accent-hover: #ff003c;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }

        .auth-bg {
            position: absolute;
            top: -5%; left: -5%; width: 110%; height: 110%;
            background: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=2070&auto=format&fit=crop') center/cover;
            filter: blur(25px) brightness(0.25);
            z-index: -1;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 100%; max-width: 420px;
            padding: 40px 30px;
            position: relative;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .close-btn {
            position: absolute; top: 20px; right: 20px;
            background: none; border: none; color: var(--text-muted);
            font-size: 1.2rem; cursor: pointer; transition: 0.2s;
        }
        .close-btn:hover { color: white; }

        .auth-logo { text-align: center; font-size: 2rem; font-weight: 900; margin-bottom: 25px; letter-spacing: 1px; }
        .auth-logo span { color: var(--accent); }

        .auth-tabs { display: flex; background: rgba(0,0,0,0.4); border-radius: 12px; margin-bottom: 30px; padding: 5px; }
        .auth-tab { flex: 1; text-align: center; padding: 12px 0; font-weight: 800; color: var(--text-muted); cursor: pointer; border-radius: 8px; transition: 0.3s; font-size: 0.95rem; }
        .auth-tab.active { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(255, 51, 102, 0.4); }

        .auth-form { display: none; animation: formFade 0.4s ease forwards; }
        .auth-form.active-form { display: block; }
        @keyframes formFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { margin-bottom: 15px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper svg { position: absolute; left: 15px; width: 18px; height: 18px; fill: var(--text-muted); }
        .input-wrapper input {
            width: 100%; background: var(--input-bg); border: 1px solid transparent;
            padding: 15px 15px 15px 45px; border-radius: 10px; color: white; font-size: 0.95rem; outline: none; transition: 0.2s;
        }
        .input-wrapper input:focus { border-color: var(--accent); background: rgba(0,0,0,0.5); }

        .google-btn {
            width: 100%; background: white; color: black; border: none; padding: 14px; border-radius: 12px;
            font-weight: 800; font-size: 0.95rem; display: flex; justify-content: center; align-items: center; gap: 10px;
            cursor: pointer; transition: 0.2s; margin-bottom: 25px;
        }
        .google-btn:hover { background: #e5e5e5; }

        .divider { display: flex; align-items: center; text-align: center; color: var(--text-muted); font-size: 0.75rem; font-weight: 600; margin-bottom: 25px; letter-spacing: 1px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .divider::before { margin-right: 15px; } .divider::after { margin-left: 15px; }

        .submit-btn {
            width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px;
            font-weight: 800; font-size: 1rem; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .submit-btn:hover { background: var(--accent-hover); box-shadow: 0 10px 25px rgba(255, 51, 102, 0.4); transform: translateY(-2px); }

    </style>
</head>
<body>

    <div class="auth-bg"></div>

    <div class="auth-card">
        <a href="{% url 'home' %}" class="close-btn">✕</a>
        <div class="auth-logo">Ani<span>Stream</span></div>

        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchTab('login')">KIRISH</div>
            <div class="auth-tab" onclick="switchTab('register')">RO'YXATDAN O'TISH</div>
        </div>

        <form id="loginForm" class="auth-form active-form" method="POST">
            {% csrf_token %}
            <input type="hidden" name="action" value="login">

            <button type="button" class="google-btn">
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                Google orqali kirish
            </button>
            <div class="divider">YOKI</div>

            <div class="input-group">
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24"><path d="M20 4H4C2.9 4 2.01 4.9 2.01 6L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                    <input type="text" name="username" placeholder="Foydalanuvchi nomi" required>
                </div>
            </div>
            <div class="input-group">
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    <input type="password" name="password" placeholder="Parolingiz" required>
                </div>
            </div>
            <div style="text-align: right; margin-bottom: 15px;">
                <a href="#" style="color: var(--text-muted); font-size: 0.8rem; text-decoration: none;">Parolni unutdingizmi?</a>
            </div>
            <button type="submit" class="submit-btn">TIZIMGA KIRISH</button>
        </form>

        <form id="registerForm" class="auth-form" method="POST">
            {% csrf_token %}
            <input type="hidden" name="action" value="register">

            <div class="input-group">
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <input type="text" name="username" placeholder="Foydalanuvchi nomi" required>
                </div>
            </div>
            <div class="input-group">
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24"><path d="M20 4H4C2.9 4 2.01 4.9 2.01 6L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                    <input type="email" name="email" placeholder="Email manzilingiz" required>
                </div>
            </div>
            <div class="input-group">
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    <input type="password" name="password" placeholder="Yangi parol" required>
                </div>
            </div>
            <button type="submit" class="submit-btn">PROFIL YARATISH</button>
        </form>
    </div>

    <script>
        function switchTab(tabName) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.auth-tab');

            tabs.forEach(tab => tab.classList.remove('active'));

            if (tabName === 'login') {
                tabs[0].classList.add('active');
                registerForm.classList.remove('active-form');
                setTimeout(() => loginForm.classList.add('active-form'), 50);
            } else {
                tabs[1].classList.add('active');
                loginForm.classList.remove('active-form');
                setTimeout(() => registerForm.classList.add('active-form'), 50);
            }
        }
    </script>
</body>
</html>
