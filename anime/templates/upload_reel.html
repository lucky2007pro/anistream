{% extends 'base.html' %}
{% load static %}

{% block title %}Yangi Reels Yuklash | AniStream{% endblock %}

{% block extra_css %}
<style>
.upload-container {
    max-width: 600px;
    margin: 40px auto;
    background: var(--bg-surface);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    text-align: center;
}

.upload-title {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 20px;
    color: var(--accent);
}

.form-group {
    margin-bottom: 20px;
    text-align: left;
}

.form-group label {
    display: block;
    color: var(--text-dim);
    font-weight: 600;
    margin-bottom: 8px;
}

.form-group input[type="text"],
.form-group textarea {
    width: 100%;
    padding: 12px;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--glass-border);
    color: #fff;
    border-radius: 8px;
    outline: none;
    font-family: 'Outfit', sans-serif;
}

.form-group textarea {
    resize: vertical;
    min-height: 100px;
}

.file-upload-box {
    border: 2px dashed var(--glass-border);
    padding: 40px 20px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    background: rgba(0,0,0,0.1);
    transition: 0.3s;
    position: relative;
}

.file-upload-box:hover {
    border-color: var(--accent);
    background: rgba(0,212,255,0.05);
}

.file-upload-box input[type="file"] {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
}

.file-icon {
    font-size: 3rem;
    color: var(--text-dim);
    margin-bottom: 10px;
}

.submit-btn {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    background: #00d4ff;
    color: black;
    border: none;
    font-weight: 800;
    cursor: pointer;
    font-size: 1.1rem;
    box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
    transition: 0.3s;
    margin-top: 10px;
}

.submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
}

#file-name {
    margin-top: 15px;
    font-size: 0.95rem;
    color: var(--accent);
    font-weight: 600;
}
</style>
{% endblock %}

{% block content %}
<main class="main-content">
    <a href="{% url 'profile' %}" style="display:inline-flex; align-items:center; gap:5px; margin-bottom: 20px; color: var(--accent); text-decoration: none; font-weight: 800; background: rgba(0,243,255,0.1); padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(0,243,255,0.2); transition: 0.3s;" onmouseover="this.style.background='rgba(0,243,255,0.2)'" onmouseout="this.style.background='rgba(0,243,255,0.1)'">
        <i class='bx bx-arrow-back'></i> Orqaga
    </a>
    
    <div class="upload-container">
        <h1 class="upload-title">Yangi Reels Yuklash</h1>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Video Sarlavhasi (Ixtiyoriy)</label>
                <input type="text" name="title" placeholder="Ajoyib sarlavha o'ylab toping...">
            </div>
            
            <div class="form-group">
                <label>Ta'rif (Ixtiyoriy)</label>
                <textarea name="description" placeholder="#anime #shorts va hk..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Video Fayl (.mp4)</label>
                <div class="file-upload-box" id="upload-box">
                    <i class='bx bx-cloud-upload file-icon'></i>
                    <p>Videoni tanlash uchun shu yerga bosing</p>
                    <input type="file" name="video_file" id="video-input" accept="video/mp4,video/quicktime" required>
                    <div id="file-name">Tanlanmagan</div>
                </div>
            </div>
            
            <button type="submit" class="submit-btn" id="submit-btn">
                <i class='bx bx-upload'></i> Yuklash
            </button>
        </form>
    </div>
</main>

<script>
    const input = document.getElementById('video-input');
    const fileName = document.getElementById('file-name');
    const submitBtn = document.getElementById('submit-btn');

    input.addEventListener('change', function(e) {
        if (this.files && this.files[0]) {
            fileName.textContent = this.files[0].name;
            fileName.style.color = '#00d4ff';
        } else {
            fileName.textContent = 'Tanlanmagan';
            fileName.style.color = '';
        }
    });

    document.querySelector('form').addEventListener('submit', function() {
        submitBtn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Yuklanmoqda...";
        submitBtn.style.opacity = '0.8';
        submitBtn.disabled = true;
    });
</script>
{% endblock %}
