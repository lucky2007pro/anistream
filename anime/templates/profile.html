    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f0f13;
            --bg-surface: #1a1a24;
            --accent: #ff3366;
            --accent-hover: #ff003c;
            --text-light: #ffffff;
            --text-dim: #8a8a9d;
            --glass-bg: rgba(26, 26, 36, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-light); overflow-x: hidden; padding-top: 80px; }

        .navbar { position: fixed; top: 0; left: 0; width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(15, 15, 19, 0.98); backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .nav-brand { font-size: 1.8rem; font-weight: 900; color: var(--text-light); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-brand span { color: var(--accent); }
        .nav-menu { display: flex; gap: 35px; }
        .nav-menu a { color: var(--text-light); text-decoration: none; font-weight: 600; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; position: relative; transition: color 0.3s; }
        .nav-menu a:hover { color: var(--accent); }
        .nav-actions { display: flex; gap: 15px; }
        .action-icon { background: transparent; border: none; color: var(--text-light); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: background 0.2s ease; font-size: 1.4rem; text-decoration: none; }
        .action-icon:hover { background: rgba(255, 255, 255, 0.1); }
        .profile-btn { background: var(--accent); border: 1px solid var(--accent); }

        .container { max-width: 1400px; margin: 0 auto; padding: 40px 5%; }
        .profile-header { background: var(--bg-surface); border-radius: 20px; padding: 40px; margin-bottom: 30px; border: 1px solid var(--glass-border); display: flex; align-items: center; gap: 30px; }
        .avatar-large { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #ff8a00); display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; box-shadow: 0 10px 30px rgba(255, 51, 102, 0.4); }
        .profile-info h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 5px; }
        .profile-handle { color: var(--accent); font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; display: block; }
        .profile-stats { display: flex; gap: 30px; margin-top: 20px; }
        .stat-item { text-align: center; }
        .stat-number { font-size: 2rem; font-weight: 900; color: var(--accent); }
        .stat-label { font-size: 0.85rem; color: var(--text-dim); font-weight: 700; text-transform: uppercase; }

        .content-grid { display: grid; grid-template-columns: 250px 1fr; gap: 30px; }
        .sidebar-menu { background: var(--bg-surface); border-radius: 16px; padding: 20px; border: 1px solid var(--glass-border); height: fit-content; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 15px; color: var(--text-dim); text-decoration: none; font-weight: 700; font-size: 1rem; border-radius: 10px; transition: all 0.3s; margin-bottom: 5px; }
        .menu-item:hover, .menu-item.active { background: rgba(255, 51, 102, 0.1); color: var(--accent); }
        .menu-item span:first-child { font-size: 1.3rem; }

        .main-content { background: var(--bg-surface); border-radius: 16px; padding: 30px; border: 1px solid var(--glass-border); }
        .section-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 25px; }
        .section-title span { color: var(--accent); }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 0.9rem; font-weight: 700; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .form-input { width: 100%; background: var(--bg-base); border: 1px solid var(--glass-border); border-radius: 10px; padding: 12px 15px; color: var(--text-light); font-size: 1rem; outline: none; transition: border-color 0.3s; }
        .form-input:focus { border-color: var(--accent); }
        .form-textarea { resize: vertical; min-height: 100px; }

        .btn-primary { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 12px 30px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: all 0.3s; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 51, 102, 0.4); }
        .btn-secondary { background: var(--bg-base); color: var(--text-light); border: 1px solid var(--glass-border); }
        .btn-secondary:hover { border-color: var(--accent); background: rgba(255, 51, 102, 0.1); transform: none; box-shadow: none; }

        @media (max-width: 968px) {
            .content-grid { grid-template-columns: 1fr; }
            .profile-header { flex-direction: column; text-align: center; }
            .nav-menu { display: none; }
        }

        /* ===== HAMBURGER MENU ===== */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 5px;
            z-index: 10001;
        }
        .hamburger span {
            display: block;
            width: 25px;
            height: 2px;
            background: #fff;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .mobile-nav-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,15,19,0.98);
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0;
        }
        .mobile-nav-overlay.open { display: flex; }
        .mobile-nav-overlay a {
            color: #fff;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 18px 40px;
            width: 100%;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: color 0.2s, background 0.2s;
        }
        .mobile-nav-overlay a:hover { color: #ff3366; background: rgba(255,51,102,0.05); }
        .mobile-nav-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
        }

        /* ===== RESPONSIVE: UMUMIY ===== */
        @media (max-width: 1024px) {
            .container { padding: 0 4%; }
        }
        @media (max-width: 768px) {
            .navbar, nav.navbar { padding: 12px 4%; }
            .nav-menu { display: none !important; }
            .hamburger { display: flex !important; }
            .nav-brand { font-size: 1.4rem; }
            .nav-actions .action-icon:not(.profile-btn):not([href="/search"]) { display: none; }
            .container { padding: 0 4%; }

            .page-header { padding: 80px 4% 30px; text-align: center; }
            .page-title { font-size: 2rem !important; }

            .anime-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important; gap: 12px !important; }
            .anime-card { height: 210px !important; }

            .genres-grid, .features-grid, .stats-grid {
                grid-template-columns: 1fr 1fr !important;
                gap: 15px;
            }
            .filters-grid { grid-template-columns: 1fr !important; }

            .profile-sidebar { width: 100%; right: -100%; border-left: none; }
            .profile-sidebar.active { right: 0; }

            /* Auth */
            .auth-wrapper { flex-direction: column; min-height: auto; }
            .auth-left { display: none; }
            .auth-right { width: 100%; padding: 20px; }
            .auth-card { padding: 30px 20px; max-width: 100%; }

            /* Premium */
            .pricing-grid { grid-template-columns: 1fr !important; max-width: 400px; margin: 0 auto; }

            /* Schedule */
            .schedule-grid { grid-template-columns: 1fr !important; }

            /* News */
            .news-grid { grid-template-columns: 1fr !important; }

            /* Search */
            .search-hero { padding: 80px 4% 30px; }

            /* Contact */
            .contact-grid { grid-template-columns: 1fr !important; }
            .contact-form-wrapper { padding: 25px 20px; }

            /* Settings */
            .settings-layout { flex-direction: column !important; }
            .settings-sidebar-nav { width: 100% !important; }

            /* Profile */
            .profile-header { flex-direction: column; text-align: center; gap: 20px; }
            .profile-stats { justify-content: center; }

            /* FAQ */
            .faq-grid { grid-template-columns: 1fr !important; }

            /* History */
            .history-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important; }
        }
        @media (max-width: 480px) {
            .page-title { font-size: 1.6rem !important; }
            .nav-brand { font-size: 1.2rem; }
            .anime-grid { grid-template-columns: repeat(2, 1fr) !important; }
            .genres-grid, .features-grid, .stats-grid { grid-template-columns: 1fr !important; }
            .section-title h3, .section-title { font-size: 1.3rem !important; }
        }

    </style>
</head>

<script>
    function toggleMobileNav() {
        const overlay = document.getElementById('mobileNavOverlay');
        const btn = document.getElementById('hamburgerBtn');
        if (overlay && btn) {
            overlay.classList.toggle('open');
            btn.classList.toggle('active');
            document.body.style.overflow = overlay.classList.contains('open') ? 'hidden' : '';
        }
    }
</script>
